name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5

  # Runs only when a release PR is merged (release created).
  # Chained here because releases created with GITHUB_TOKEN don't trigger `on: release` workflows.
  testflight:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: sunpebble/ci/.github/workflows/ios-testflight.yml@v2
    with:
      xcode_project: Steady.xcodeproj
      scheme: Steady
      ipa_basename: Steady
    secrets: inherit
